<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width:100%; height:100%; background:#060306; color:#d4c4b8; font-family:'Cormorant Garamond',serif; overflow:hidden; }

  #bg-canvas {
    position:fixed; inset:0; width:100%; height:100%; z-index:0;
    pointer-events:none;
  }

  /* push all UI above canvas */
  #back-btn, #counter, #stage, .nav-btn, #lightbox { z-index: 10; }

  #back-btn {
    position:fixed; top:28px; left:36px; z-index:100;
    font-family:'Cormorant Garamond',serif; font-size:13px; letter-spacing:0.18em; text-transform:uppercase;
    color:rgba(212,196,184,0.4); text-decoration:none; cursor:pointer; border:none; background:none;
    transition:color 0.3s; display:flex; align-items:center; gap:8px;
  }
  #back-btn:hover { color:#d4c4b8; }
  #back-btn::before { content:''; display:inline-block; width:28px; height:1px; background:currentColor; transition:width 0.3s; }
  #back-btn:hover::before { width:44px; }
  #counter { position:fixed; top:28px; right:36px; z-index:100; font-size:13px; letter-spacing:0.14em; color:rgba(212,196,184,0.4); }
  #counter span { color:#d4c4b8; }

  #stage { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; perspective:1400px; }
  #cluster-wrap { position:relative; width:100vw; height:100vh; transform-style:preserve-3d; }

  .cluster {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    transform-style:preserve-3d;
    transition:transform 1s cubic-bezier(0.77,0,0.18,1), opacity 0.75s ease;
    will-change:transform,opacity;
  }
  .cluster.state-current { transform:translateZ(0);      opacity:1; pointer-events:all; }
  .cluster.state-behind  { transform:translateZ(-1100px); opacity:0; pointer-events:none; }
  .cluster.state-front   { transform:translateZ(1100px);  opacity:0; pointer-events:none; }

  @keyframes comeFromBehind { from{transform:translateZ(-1100px);opacity:0} to{transform:translateZ(0);opacity:1} }
  @keyframes goToBehind     { from{transform:translateZ(0);opacity:1} to{transform:translateZ(-1100px);opacity:0} }
  @keyframes comeFromFront  { from{transform:translateZ(1100px);opacity:0} to{transform:translateZ(0);opacity:1} }
  @keyframes goToFront      { from{transform:translateZ(0);opacity:1} to{transform:translateZ(1100px);opacity:0} }
  .anim-in-from-behind { animation:comeFromBehind 1s cubic-bezier(0.77,0,0.18,1) forwards; }
  .anim-out-to-behind  { animation:goToBehind     1s cubic-bezier(0.77,0,0.18,1) forwards; }
  .anim-in-from-front  { animation:comeFromFront  1s cubic-bezier(0.77,0,0.18,1) forwards; }
  .anim-out-to-front   { animation:goToFront      1s cubic-bezier(0.77,0,0.18,1) forwards; }

  .organism { position:relative; width:min(540px,82vw); height:min(540px,82vw); }
  .organism svg { position:absolute; inset:0; width:100%; height:100%; overflow:visible;
    animation:breathe 3.8s ease-in-out infinite; transform-origin:50% 50%; }
  @keyframes breathe { 0%{transform:scale(1)} 45%{transform:scale(1.06)} 100%{transform:scale(1)} }

  .vein-layer  { animation:veinBreathe  3.8s ease-in-out infinite; }
  .spec-layer  { animation:specBreathe  3.8s ease-in-out infinite; }
  .bumps-layer { animation:bumpBreathe  3.8s ease-in-out infinite; }
  @keyframes veinBreathe  { 0%{opacity:0.2}  45%{opacity:0.55} 100%{opacity:0.2}  }
  @keyframes specBreathe  { 0%{opacity:0.45} 45%{opacity:1}    100%{opacity:0.45} }
  @keyframes bumpBreathe  { 0%{opacity:0.65} 45%{opacity:1}    100%{opacity:0.65} }

  .pore-img {
    filter: saturate(0.75) brightness(0.82) contrast(1.08);
    transition: filter 0.3s ease;
  }
  .pore-hit { cursor: pointer; }

  .cluster-label { position:absolute; bottom:-52px; left:50%; transform:translateX(-50%);
    font-size:11px; letter-spacing:0.22em; text-transform:uppercase;
    color:rgba(212,196,184,0.3); white-space:nowrap; font-style:italic; }

  .nav-btn {
    position:fixed; bottom:40px; z-index:100;
    font-family:'Cormorant Garamond',serif; font-size:13px; letter-spacing:0.18em; text-transform:uppercase;
    color:rgba(212,196,184,0.4); background:none; border:none; cursor:pointer; transition:color 0.3s;
    display:flex; align-items:center; gap:10px;
  }
  .nav-btn:hover { color:#d4c4b8; }
  .nav-btn:disabled { opacity:0.15; cursor:default; }
  #prev-btn { left:36px; }
  #prev-btn::before { content:''; display:inline-block; width:28px; height:1px; background:currentColor; transition:width 0.3s; }
  #prev-btn:hover:not(:disabled)::before { width:44px; }
  #next-btn { right:36px; }
  #next-btn::after { content:''; display:inline-block; width:28px; height:1px; background:currentColor; transition:width 0.3s; }
  #next-btn:hover:not(:disabled)::after { width:44px; }

  #lightbox { position:fixed; inset:0; z-index:200; background:rgba(4,1,1,0.97); display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.4s ease; }
  #lightbox.open { opacity:1; pointer-events:all; }
  #lightbox img { max-width:88vw; max-height:88vh; object-fit:contain; transform:scale(0.93); transition:transform 0.45s cubic-bezier(0.34,1.2,0.64,1); }
  #lightbox.open img { transform:scale(1); }
  #lightbox-close { position:absolute; top:28px; right:36px; font-size:13px; letter-spacing:0.18em; text-transform:uppercase; color:rgba(212,196,184,0.4); background:none; border:none; cursor:pointer; font-family:'Cormorant Garamond',serif; transition:color 0.3s; }
  #lightbox-close:hover { color:#d4c4b8; }
  .lb-nav { position:absolute; top:50%; transform:translateY(-50%); font-size:13px; letter-spacing:0.18em; text-transform:uppercase; color:rgba(212,196,184,0.4); background:none; border:none; cursor:pointer; font-family:'Cormorant Garamond',serif; transition:color 0.3s; display:flex; align-items:center; gap:8px; }
  .lb-nav:hover { color:#d4c4b8; }
  #lb-prev { left:28px; }
  #lb-prev::before { content:''; display:inline-block; width:20px; height:1px; background:currentColor; }
  #lb-next { right:28px; }
  #lb-next::after  { content:''; display:inline-block; width:20px; height:1px; background:currentColor; }
</style>
</head>

<canvas id="bg-canvas"></canvas>

<!-- LOADING SCREEN -->
<div id="loader">
  <div id="loader-inner">
    <div id="loader-organism">
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="lg" cx="38%" cy="32%" r="65%">
            <stop offset="0%" stop-color="#6e2020"/>
            <stop offset="50%" stop-color="#300a0a"/>
            <stop offset="100%" stop-color="#0d0303"/>
          </radialGradient>
          <filter id="lf">
            <feTurbulence type="fractalNoise" baseFrequency="0.065" numOctaves="4" seed="3" result="n"/>
            <feDisplacementMap in="SourceGraphic" in2="n" scale="5" xChannelSelector="R" yChannelSelector="G"/>
          </filter>
        </defs>
        <ellipse cx="60" cy="60" rx="50" ry="50" fill="url(#lg)" filter="url(#lf)" class="loader-blob"/>
      </svg>
    </div>
    <div id="loader-bar-wrap">
      <div id="loader-bar"></div>
    </div>
    <div id="loader-text">loading</div>
  </div>
</div>

<style>
  #loader {
    position: fixed; inset: 0; z-index: 1000;
    background: #060306;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.8s ease;

    transform-origin: 60px 60px;
    animation: loaderPulse 1.8s ease-in-out infinite;
  }
  @keyframes loaderPulse {
    0%   { transform: scale(1);     opacity: 0.8; }
    50%  { transform: scale(1.08);  opacity: 1;   }
    100% { transform: scale(1);     opacity: 0.8; }
  }
  #loader-bar-wrap {
    width: 160px; height: 1px;
    background: rgba(212,196,184,0.12);
    position: relative; overflow: hidden;
  }
  #loader-bar {
    position: absolute; left: 0; top: 0; height: 100%;
    width: 0%; background: rgba(212,196,184,0.55);
    transition: width 0.3s ease;
  }
  #loader-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;
    color: rgba(212,196,184,0.35);
  }
  /* Main UI hidden until load complete */
  #main-ui { opacity: 0; transition: opacity 0.8s ease; }
  #main-ui.visible { opacity: 1; }
</style>

<div id="main-ui">
<a id="back-btn" href="https://birdbrain1991.github.io/vault/">Vault</a>
<div id="counter"><span id="cnt-cur">1</span> / <span id="cnt-tot">9</span></div>
<div id="stage"><div id="cluster-wrap"></div></div>
<button class="nav-btn" id="prev-btn" disabled>Prev</button>
<button class="nav-btn" id="next-btn">Next</button>
<div id="lightbox">

  <button class="lb-nav" id="lb-prev">Prev</button>

  <button class="lb-nav" id="lb-next">Next</button>
</div>
</div><!-- /main-ui -->

function getLayout(n) {
  if (poreLayouts[n]) return poreLayouts[n];
  // fallback: use closest smaller layout
  const keys = Object.keys(poreLayouts).map(Number).sort((a,b)=>b-a);
  return poreLayouts[keys.find(k => k <= n) || keys[keys.length-1]];
}

function nearPore(x, y, r, pores) {
  return pores.some(p => Math.hypot(x - p.cx, y - p.cy) < p.r + r + 16);
}

function makeOrganismSVG(ci) {
  const n = clusters[ci].images.length;
  const pores = getLayout(n);

  const filteredBumps = allBumps.filter(b => !nearPore(b.x, b.y, b.r, pores));

  const bumpDefs = filteredBumps.map((b, i) =>
    `<radialGradient id="bg${ci}_${i}" cx="36%" cy="28%" r="62%">
      <stop offset="0%" stop-color="#7e2222"/>
      <stop offset="42%" stop-color="#4c1212"/>
      <stop offset="100%" stop-color="#1e0707"/>
    </radialGradient>`).join('');

  const bumpCircles = filteredBumps.map((b, i) =>
    `<circle cx="${b.x}" cy="${b.y}" r="${b.r}" fill="url(#bg${ci}_${i})"/>`).join('');

  const poreDefs = pores.map((p, i) => `
    <radialGradient id="pr${ci}_${i}" cx="38%" cy="28%" r="65%">
      <stop offset="0%"   stop-color="rgba(100,20,20,0.0)"/>
      <stop offset="60%"  stop-color="rgba(60,10,10,0.55)"/>
      <stop offset="100%" stop-color="rgba(18,4,4,0.9)"/>
    </radialGradient>
    <clipPath id="pc${ci}_${i}">
      <circle cx="${p.cx}" cy="${p.cy}" r="${p.r}"/>
    </clipPath>`).join('');

  const poresSVG = pores.slice(0, clusters[ci].images.length).map((p, i) => {
    const url = clusters[ci].images[i];
    if (!url) return '';
    const delay = (i * 0.28).toFixed(2);
    return `
      <circle cx="${p.cx}" cy="${p.cy}" r="${p.r+10}" fill="url(#pr${ci}_${i})" style="filter:drop-shadow(0 0 7px rgba(140,25,15,0.65))"/>
      <circle cx="${p.cx}" cy="${p.cy}" r="${p.r+2}" fill="none" stroke="#250808" stroke-width="2.5"/>
      <image href=""
        x="${p.cx-p.r}" y="${p.cy-p.r}" width="${p.r*2}" height="${p.r*2}"
        clip-path="url(#pc${ci}_${i})"
        preserveAspectRatio="xMidYMid slice"
        style="animation-delay:${delay}s;opacity:0;transition:opacity 0.4s ease"
        class="pore-img" data-src="${thumbUrl(url)}"/>
      <circle cx="${p.cx}" cy="${p.cy}" r="${p.r}"
        fill="transparent" style="cursor:pointer"

  </defs>
  <g clip-path="url(#blobClip${ci})">

    <g class="vein-layer" stroke="#0e0202" stroke-width="1.4" fill="none">

function buildCluster(ci) {
  const c = clusters[ci];
  const div = document.createElement('div');
  div.className = 'cluster'; div.dataset.ci = ci;
  const org = document.createElement('div');
  org.className = 'organism';
  org.innerHTML = makeOrganismSVG(ci);
  org.querySelectorAll('.pore-hit').forEach(hit => {
    hit.addEventListener('click', () => openLightbox(+hit.dataset.ci, +hit.dataset.idx));
    // hover: scale up the preceding image
    hit.addEventListener('mouseenter', () => {
      const img = hit.previousElementSibling;
      if (img && img.classList.contains('pore-img')) {
        img.style.filter = 'saturate(1.1) brightness(1.05) contrast(1.0)';
        img.style.transition = 'filter 0.3s';
      }
      hit.style.opacity = '0.15';
      hit.style.fill = 'rgba(255,200,150,0.08)';
    });
    hit.addEventListener('mouseleave', () => {
      const img = hit.previousElementSibling;
      if (img && img.classList.contains('pore-img')) {
        img.style.filter = '';
      }
      hit.style.opacity = '';
      hit.style.fill = 'transparent';
    });
  });
  const lbl = document.createElement('div');
  lbl.className = 'cluster-label'; lbl.textContent = c.label;
  org.appendChild(lbl);
  div.appendChild(org);
  return div;
}

let current = 0, animating = false;
const wrap = document.getElementById('cluster-wrap');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');
document.getElementById('cnt-tot').textContent = clusters.length;

// ── IMAGE CACHE & PRELOADER ───────────────────────────────────────────────
const imageCache = new Map();

function thumbUrl(url) { return url.replace('/upload/', '/upload/w_300,q_auto,f_auto/'); }
function hiUrl(url)    { return url.replace('/upload/', '/upload/w_1400,q_auto,f_auto/'); }

function preloadImage(url) {
  if (imageCache.get(url) === true) return Promise.resolve(url);
  if (imageCache.has(url)) return imageCache.get(url);
  const p = new Promise(resolve => {
    const img = new Image();
    img.onload = img.onerror = () => { imageCache.set(url, true); resolve(url); };
    img.src = url;
  });
  imageCache.set(url, p);
  return p;
}

function injectHrefs(ci) {
  const el = wrap.querySelector(`.cluster[data-ci="${ci}"]`);
  if (!el) return;
  el.querySelectorAll('.pore-img').forEach(img => {
    const src = img.dataset.src;
    if (src && !img.getAttribute('href')) {
      img.setAttribute('href', src);
      requestAnimationFrame(() => { img.style.opacity = '1'; });
    }
  });
}

function preloadAndInject(ci) {
  const urls = clusters[ci].images.map(thumbUrl);
  return Promise.all(urls.map(preloadImage)).then(() => injectHrefs(ci));
}

// ── LOADING SCREEN ────────────────────────────────────────────────────────
const loaderBar  = document.getElementById('loader-bar');
const loaderText = document.getElementById('loader-text');
const loaderEl   = document.getElementById('loader');
const mainUI     = document.getElementById('main-ui');

// Build all cluster DOM first (images hidden, href empty)
clusters.forEach((_, i) => {
  const el = buildCluster(i);
  el.classList.add(i === 0 ? 'state-current' : 'state-behind');
  wrap.appendChild(el);
});

// Count total images
const allThumbs = clusters.flatMap(c => c.images.map(thumbUrl));
const total = allThumbs.length;
let loaded = 0;

function onOneLoaded() {
  loaded++;
  const pct = Math.round((loaded / total) * 100);
  loaderBar.style.width = pct + '%';
  if (loaded === total) onAllLoaded();
}

function onAllLoaded() {
  // inject all hrefs now that everything is cached
  clusters.forEach((_, i) => injectHrefs(i));
  loaderText.textContent = 'enter';
  // short pause then fade out loader, fade in UI
  setTimeout(() => {
    loaderEl.classList.add('fade-out');
    mainUI.classList.add('visible');
    setTimeout(() => { loaderEl.style.display = 'none'; }, 900);
  }, 400);
}

// Kick off all preloads in parallel, each calls onOneLoaded when done
allThumbs.forEach(url => {
  preloadImage(url).then(onOneLoaded);
});

function getEl(i) { return wrap.querySelector(`.cluster[data-ci="${i}"]`); }

function navigate(dir) {
  if (animating) return;
  const next = current + dir;
  if (next < 0 || next >= clusters.length) return;
  animating = true;
  const curEl = getEl(current), nxtEl = getEl(next);
  curEl.classList.remove('state-current');
  nxtEl.classList.remove('state-behind','state-front','state-current');
  nxtEl.style.opacity = 0; nxtEl.style.pointerEvents = 'none';
  if (dir === 1) { curEl.classList.add('anim-out-to-behind'); nxtEl.classList.add('anim-in-from-front'); }
  else           { curEl.classList.add('anim-out-to-front');  nxtEl.classList.add('anim-in-from-behind'); }
  setTimeout(() => {
    curEl.classList.remove('anim-out-to-behind','anim-out-to-front');
    nxtEl.classList.remove('anim-in-from-front','anim-in-from-behind');
    curEl.classList.add(dir === 1 ? 'state-behind' : 'state-front');
    nxtEl.classList.add('state-current');
    nxtEl.style.opacity = ''; nxtEl.style.pointerEvents = '';
    current = next; updateUI(); animating = false;
  }, 1000);
}

function updateUI() {
  document.getElementById('cnt-cur').textContent = current + 1;
  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === clusters.length - 1;
}
prevBtn.addEventListener('click', () => navigate(-1));
nextBtn.addEventListener('click', () => navigate(1));
updateUI();

let lbCluster = 0, lbIndex = 0;
const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lb-img');

function openLightbox(ci, idx) {
  lbCluster = ci; lbIndex = idx;
  const hi = hiUrl(clusters[ci].images[idx]);
  lbImg.src = hi;
  lb.classList.add('open'); updateLbNav();
  // preload adjacent hi-res images
  const prev = clusters[ci].images[idx-1];
  const next = clusters[ci].images[idx+1];
  if (prev) preloadImage(hiUrl(prev));
  if (next) preloadImage(hiUrl(next));
}
function closeLightbox() { lb.classList.remove('open'); }
function updateLbNav() {
  document.getElementById('lb-prev').style.opacity = lbIndex === 0 ? '0.2' : '1';
  document.getElementById('lb-next').style.opacity = lbIndex >= clusters[lbCluster].images.length-1 ? '0.2' : '1';
}
document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
lb.addEventListener('click', e => { if(e.target===lb) closeLightbox(); });
document.getElementById('lb-prev').addEventListener('click', () => { if(lbIndex>0){lbIndex--;openLightbox(lbCluster,lbIndex);} });
document.getElementById('lb-next').addEventListener('click', () => { if(lbIndex<clusters[lbCluster].images.length-1){lbIndex++;openLightbox(lbCluster,lbIndex);} });
document.addEventListener('keydown', e => {
  if(!lb.classList.contains('open')) return;
  if(e.key==='Escape') closeLightbox();
  if(e.key==='ArrowLeft'&&lbIndex>0){lbIndex--;openLightbox(lbCluster,lbIndex);}
  if(e.key==='ArrowRight'&&lbIndex<clusters[lbCluster].images.length-1){lbIndex++;openLightbox(lbCluster,lbIndex);}
});
</script>

<script>
// ── ALIEN BODY INTERIOR BACKGROUND ──────────────────────────────────────────
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, cx, cy;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    cx = W / 2; cy = H / 2;
  }
  window.addEventListener('resize', resize);
  resize();

  // ── PARAMETERS ──────────────────────────────────────────────────────────
  const BEAT   = 3.8;   // seconds – synced to organism breathing
  const COLORS = {
    void:    '#030103',
    deep:    '#0a0208',
    cavity:  '#120408',
    flesh1:  '#1e0608',
    flesh2:  '#2e0a0c',
    vein1:   '#3a0808',
    vein2:   '#520d0d',
    bright:  '#6e1414',
    glow:    'rgba(120,18,18,',
    pulse:   'rgba(180,30,20,',
    shine:   'rgba(255,160,120,',
  };

  // ── VEIN PATHS (static, drawn each frame with varying opacity) ───────────
  // Each vein: array of [x%,y%] control points, drawn as bezier
  const VEINS = [
    // large artery top-left → bottom-right
    [[0.05,0.12],[0.18,0.28],[0.32,0.45],[0.28,0.62],[0.38,0.78],[0.52,0.92]],
    [[0.08,0.08],[0.22,0.25],[0.18,0.48],[0.32,0.65],[0.42,0.82]],
    // right side
    [[0.95,0.08],[0.78,0.22],[0.82,0.44],[0.72,0.60],[0.78,0.82],[0.62,0.96]],
    [[0.92,0.15],[0.80,0.30],[0.88,0.52],[0.74,0.70],[0.68,0.90]],
    // bottom
    [[0.12,0.95],[0.28,0.80],[0.45,0.88],[0.60,0.78],[0.78,0.88],[0.92,0.96]],
    [[0.20,0.98],[0.35,0.85],[0.50,0.92],[0.65,0.82],[0.80,0.94]],
    // top
    [[0.22,0.02],[0.38,0.12],[0.50,0.08],[0.62,0.14],[0.78,0.04]],
    [[0.30,0.00],[0.44,0.10],[0.56,0.06],[0.70,0.12]],
    // diagonal left
    [[0.00,0.40],[0.12,0.52],[0.08,0.66],[0.18,0.78]],
    [[0.00,0.60],[0.14,0.68],[0.10,0.80],[0.20,0.90]],
    // diagonal right
    [[1.00,0.35],[0.88,0.46],[0.92,0.60],[0.82,0.72]],
    [[1.00,0.55],[0.86,0.64],[0.90,0.76],[0.80,0.88]],
    // branching from center-left toward cluster
    [[0.28,0.38],[0.36,0.44],[0.42,0.50]],
    [[0.28,0.62],[0.36,0.56],[0.42,0.50]],
    [[0.72,0.38],[0.64,0.44],[0.58,0.50]],
    [[0.72,0.62],[0.64,0.56],[0.58,0.50]],
  ];

  // ── MEMBRANE RINGS (concentric, giving tunnel/depth illusion) ───────────
  // radiusX%, radiusY%, centerX%, centerY%
  const RINGS = [
    {rx:0.52, ry:0.50, x:0.50, y:0.50, w:38},
    {rx:0.65, ry:0.62, x:0.50, y:0.50, w:28},
    {rx:0.78, ry:0.74, x:0.49, y:0.51, w:20},
    {rx:0.90, ry:0.86, x:0.49, y:0.51, w:14},
    {rx:1.05, ry:1.00, x:0.48, y:0.52, w:10},
    {rx:1.22, ry:1.16, x:0.48, y:0.52, w:7},
    {rx:1.44, ry:1.36, x:0.47, y:0.53, w:5},
  ];

  // ── SURFACE BUMPS on the cavity walls ───────────────────────────────────
  // pre-defined so they don't move each frame
  const rng = (seed) => { let s=seed; return () => { s=(s*16807+0)%2147483647; return (s-1)/2147483646; }; };
  const rand = rng(42);
  const BUMPS = Array.from({length:60}, () => ({
    x: rand(), y: rand(),
    r: 0.012 + rand()*0.028,
    edge: rand() > 0.5, // true = near edge, false = midground
  })).filter(b => {
    // keep only bumps near the edges (away from center cluster area)
    const dx = b.x - 0.5, dy = b.y - 0.5;
    const d = Math.sqrt(dx*dx + dy*dy);
    return d > 0.28;
  });

  // ── DRIP / FLUID STREAKS ────────────────────────────────────────────────
  const DRIPS = Array.from({length:14}, (_, i) => {
    const r2 = rng(i*7+3);
    return {
      x: r2(), startY: r2()*0.4,
      len: 0.08 + r2()*0.18,
      speed: 0.012 + r2()*0.018,
      phase: r2()*Math.PI*2,
      w: 0.8 + r2()*1.4,
    };
  });

  // ── PULSING GLOW NODES (like bioluminescent organs) ─────────────────────
  const NODES = [
    {x:0.12, y:0.18, r:0.06, phase:0.0},
    {x:0.88, y:0.15, r:0.05, phase:1.2},
    {x:0.08, y:0.72, r:0.07, phase:2.1},
    {x:0.90, y:0.78, r:0.06, phase:0.8},
    {x:0.50, y:0.06, r:0.05, phase:1.7},
    {x:0.50, y:0.94, r:0.06, phase:0.4},
    {x:0.15, y:0.48, r:0.04, phase:3.0},
    {x:0.85, y:0.50, r:0.04, phase:2.5},
  ];

  function drawVein(pts, alpha, width, col) {
    if (pts.length < 2) return;
    ctx.beginPath();
    ctx.moveTo(pts[0][0]*W, pts[0][1]*H);
    for (let i=1; i<pts.length-1; i++) {
      const mx = (pts[i][0]+pts[i+1][0])/2*W;
      const my = (pts[i][1]+pts[i+1][1])/2*H;
      ctx.quadraticCurveTo(pts[i][0]*W, pts[i][1]*H, mx, my);
    }
    const last = pts[pts.length-1];
    ctx.lineTo(last[0]*W, last[1]*H);
    ctx.strokeStyle = col || `rgba(80,10,10,${alpha})`;
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  let t = 0;
  function frame(ts) {
    t = ts * 0.001;
    // beat phase 0→1 over BEAT seconds, eased
    const rawBeat = (t % BEAT) / BEAT;
    // ease: fast expansion, slow release – like a heartbeat
    const beat = rawBeat < 0.45
      ? Math.pow(rawBeat / 0.45, 0.6)
      : 1 - Math.pow((rawBeat - 0.45) / 0.55, 1.8);
    const pulse = beat; // 0 = resting, 1 = peak

    ctx.clearRect(0, 0, W, H);

    // ── 1. DEEP VOID BASE ─────────────────────────────────────────────────
    const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W,H)*0.72);
    bgGrad.addColorStop(0.0, `rgba(18,4,6,${0.85 + pulse*0.12})`);
    bgGrad.addColorStop(0.35,`rgba(10,2,4,1)`);
    bgGrad.addColorStop(0.7, `rgba(6,1,3,1)`);
    bgGrad.addColorStop(1.0, `rgba(2,0,2,1)`);
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // ── 2. MEMBRANE RINGS (depth tunnel) ─────────────────────────────────
    RINGS.forEach((ring, ri) => {
      const depth = ri / (RINGS.length - 1); // 0=inner 1=outer
      // rings pulse outward from center on beat
      const pulseFactor = 1 + pulse * 0.022 * (1 - depth*0.5);
      const rx = ring.rx * W * 0.5 * pulseFactor;
      const ry = ring.ry * H * 0.5 * pulseFactor;
      const ecx = ring.x * W, ecy = ring.y * H;

      // flesh color darkens toward outer rings
      const r = Math.round(lerp(62, 12, depth));
      const g = Math.round(lerp(8,  2, depth));
      const b = Math.round(lerp(8,  3, depth));
      const baseAlpha = lerp(0.55, 0.18, depth) + pulse * lerp(0.2, 0.04, depth);
      const lineW = ring.w * (W / 1400) * (1 + pulse*0.08);

      ctx.beginPath();
      ctx.ellipse(ecx, ecy, rx, ry, 0, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(${r},${g},${b},${baseAlpha})`;
      ctx.lineWidth = lineW;
      ctx.stroke();

      // inner glow on the ring during pulse
      if (depth < 0.5) {
        ctx.beginPath();
        ctx.ellipse(ecx, ecy, rx, ry, 0, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(160,25,18,${pulse * 0.12 * (1-depth*2)})`;
        ctx.lineWidth = lineW * 0.3;
        ctx.stroke();
      }
    });

    // ── 3. CAVITY WALL TEXTURE – radial flesh gradient ────────────────────
    // dark void in center, flesh toward edges
    const wallGrad = ctx.createRadialGradient(cx, cy, Math.min(W,H)*0.18, cx, cy, Math.max(W,H)*0.68);
    wallGrad.addColorStop(0,   'rgba(0,0,0,0)');
    wallGrad.addColorStop(0.5, `rgba(14,3,3,${0.3 + pulse*0.08})`);
    wallGrad.addColorStop(0.8, `rgba(28,6,6,${0.55 + pulse*0.12})`);
    wallGrad.addColorStop(1.0, `rgba(8,2,2,0.85)`);
    ctx.fillStyle = wallGrad;
    ctx.fillRect(0, 0, W, H);

    // ── 4. SURFACE BUMPS on cavity wall ──────────────────────────────────
    BUMPS.forEach(b => {
      const bx = b.x * W, by = b.y * H;
      const br = b.r * Math.min(W,H) * (1 + pulse*0.04);
      const bumpGrad = ctx.createRadialGradient(bx - br*0.3, by - br*0.3, 0, bx, by, br);
      bumpGrad.addColorStop(0,   `rgba(72,14,12,${0.5 + pulse*0.15})`);
      bumpGrad.addColorStop(0.5, `rgba(38,8,8,${0.4 + pulse*0.1})`);
      bumpGrad.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(bx, by, br, 0, Math.PI*2);
      ctx.fillStyle = bumpGrad;
      ctx.fill();
    });

    // ── 5. VEINS ──────────────────────────────────────────────────────────
    // Large arteries
    VEINS.slice(0, 8).forEach((pts, i) => {
      const baseW = lerp(4.5, 1.8, i/7) * (W/1400);
      const alpha = lerp(0.35, 0.18, i/7) + pulse * 0.22;
      // outer dark stroke
      drawVein(pts, alpha*0.6, baseW*2.8, `rgba(8,2,2,${alpha*0.7})`);
      // inner flesh color
      drawVein(pts, alpha, baseW, `rgba(${Math.round(lerp(90,50,i/7))},${Math.round(lerp(14,8,i/7))},${Math.round(lerp(12,7,i/7))},${alpha})`);
      // pulse glow
      if (pulse > 0.3) {
        drawVein(pts, pulse*0.18, baseW*0.4, `rgba(200,35,20,${pulse*0.22})`);
      }
    });
    // Smaller branching veins
    VEINS.slice(8).forEach((pts, i) => {
      const alpha = 0.15 + pulse * 0.14;
      drawVein(pts, alpha, 1.2*(W/1400), `rgba(60,10,10,${alpha})`);
    });

    // ── 6. BIOLUMINESCENT GLOW NODES ─────────────────────────────────────
    NODES.forEach(n => {
      const nx = n.x * W, ny = n.y * H;
      const nr = n.r * Math.min(W,H);
      // slow individual pulsing offset from main beat
      const nPulse = 0.5 + 0.5 * Math.sin(t * (Math.PI*2/BEAT) + n.phase);
      const combined = pulse * 0.6 + nPulse * 0.4;
      const ng = ctx.createRadialGradient(nx, ny, 0, nx, ny, nr);
      ng.addColorStop(0,   `rgba(140,20,14,${combined * 0.35})`);
      ng.addColorStop(0.4, `rgba(80,12,8,${combined * 0.18})`);
      ng.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(nx, ny, nr, 0, Math.PI*2);
      ctx.fillStyle = ng;
      ctx.fill();
    });

    // ── 7. FLUID DRIPS down cavity wall ──────────────────────────────────
    DRIPS.forEach(d => {
      // slow drip, looping
      const progress = ((t * d.speed + d.phase) % 1.0);
      const dy = (d.startY + progress * (1 + d.len)) % (1 + d.len);
      if (dy > 1.0) return; // off screen
      const dx = d.x * W;
      const topY = dy * H;
      const botY = Math.min((dy + d.len) * H, H);
      if (botY <= topY) return;
      const dripGrad = ctx.createLinearGradient(dx, topY, dx, botY);
      dripGrad.addColorStop(0,   'rgba(0,0,0,0)');
      dripGrad.addColorStop(0.1, `rgba(60,8,8,${0.25 + pulse*0.1})`);
      dripGrad.addColorStop(0.8, `rgba(40,6,6,${0.18 + pulse*0.08})`);
      dripGrad.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.moveTo(dx, topY);
      ctx.lineTo(dx, botY);
      ctx.strokeStyle = dripGrad;
      ctx.lineWidth = d.w;
      ctx.lineCap = 'round';
      ctx.stroke();
    });

    // ── 8. CENTRAL OPENING – dark void where cluster sits ─────────────────
    // vignette that keeps cluster area dark/clean
    const voidR = Math.min(W,H) * (0.30 - pulse * 0.018);
    const voidGrad = ctx.createRadialGradient(cx, cy, voidR*0.2, cx, cy, voidR*1.1);
    voidGrad.addColorStop(0,   `rgba(6,1,4,${0.82 + pulse*0.06})`);
    voidGrad.addColorStop(0.6, `rgba(4,1,3,${0.55})`);
    voidGrad.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = voidGrad;
    ctx.fillRect(0, 0, W, H);

    // ── 9. HEARTBEAT PULSE SHOCKWAVE ─────────────────────────────────────
    if (pulse > 0.05) {
      const shockR = Math.min(W,H) * (0.28 + pulse * 0.42);
      const shockAlpha = pulse * (1-pulse) * 0.28;
      const shockGrad = ctx.createRadialGradient(cx, cy, shockR*0.7, cx, cy, shockR);
      shockGrad.addColorStop(0,   `rgba(160,22,16,0)`);
      shockGrad.addColorStop(0.6, `rgba(160,22,16,${shockAlpha})`);
      shockGrad.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = shockGrad;
      ctx.fillRect(0, 0, W, H);
    }

    // ── 10. EDGE VIGNETTE – final darkening ──────────────────────────────
    const edgeGrad = ctx.createRadialGradient(cx, cy*0.9, 0, cx, cy, Math.max(W,H)*0.62);
    edgeGrad.addColorStop(0,   'rgba(0,0,0,0)');
    edgeGrad.addColorStop(0.55,'rgba(0,0,0,0)');
    edgeGrad.addColorStop(0.8, 'rgba(2,0,2,0.55)');
    edgeGrad.addColorStop(1.0, 'rgba(1,0,1,0.92)');
    ctx.fillStyle = edgeGrad;
    ctx.fillRect(0, 0, W, H);

    requestAnimationFrame(frame);
  }

  function lerp(a, b, t) { return a + (b-a)*t; }

  requestAnimationFrame(frame);
})();
</script>
